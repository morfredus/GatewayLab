; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description  = Gateway Lab - Découverte et inventaire des appareils sur le réseau local
default_envs = esp32s3_n16r8

[env:esp32s3_n16r8]
platform      = espressif32
board         = esp32-s3-devkitc-1-n16r8v
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

board_build.usb_mode        = "cdc"
board_build.usb_cdc_on_boot = 1
board_build.filesystem      = littlefs

; Phase de développement :
; Exécuter manuellement : python tools/minify_web.py
; Les fichiers générés sont versionnés dans Git.
; Aucun pre-script n'est requis pendant le développement actif.
;
; Lorsque la structure du projet sera stabilisée :
; Automatiser la génération des assets web avant chaque compilation en AJOUTANT
; « pre:tools/custom_hooks.py » à la clé extra_scripts définie plus bas.
;
; ATTENTION : ne pas décommenter cette ligne telle quelle. Une section ne peut
; porter qu'une seule clé extra_scripts ; une seconde écraserait la première et
; version.py cesserait silencieusement de s'exécuter — PROJECT_VERSION
; deviendrait alors introuvable à la compilation.
;
;   extra_scripts =
;       pre:tools/version.py
;       pre:tools/custom_hooks.py


build_unflags =
    -std=gnu++11
    -std=gnu++14

; PROJECT_VERSION n'est PAS ecrit ici : il est injecte par tools/version.py
; depuis le fichier VERSION a la racine, qui fait autorite comme dans les autres
; projets de l'ecosysteme. Deux endroits pour une meme valeur finissent toujours
; par diverger.
extra_scripts = pre:tools/version.py

build_flags =
    -std=gnu++17
    -D PROJECT_NAME='"GatewayLab"'
    -D TARGET_ESP32_S3

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit NeoPixel@^1.12.3
